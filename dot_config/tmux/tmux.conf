# tmux.conf -- managed by chezmoi
# Modernized from archive/legacy/tmux.conf with catppuccin + sesh + floax + smart-splits.
# See: cdocs/proposals/2026-03-21-tmux-return-and-lace-into.md

# =============================================================================
# Core Settings
# =============================================================================

# Shell: nushell
set -g default-shell ~/.cargo/bin/nu
set -g default-command ~/.cargo/bin/nu

# History and timing
set -g history-limit 99999
set -s escape-time 10
set -g scroll-on-clear off

# Prefix: Alt-z (carried forward from legacy)
set -g prefix M-z
unbind C-b
bind M-z send-prefix

# Mouse
set -g mouse on

# Vi mode
setw -g mode-keys vi

# Terminal features (targeting wezterm as outer terminal)
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB:strikethrough:usstyle:clipboard:title'
set -g set-clipboard on

# Propagate Wayland env vars on reattach for clipboard tool access (wl-paste/wl-copy)
set -ga update-environment WAYLAND_DISPLAY
set -ga update-environment XDG_RUNTIME_DIR

# Enable passthrough for image display protocols (kitty graphics, imgcat)
set -g allow-passthrough on

# Titles
set -g set-titles on

# PATH for run-shell: tmux run-shell uses /bin/sh with a minimal system PATH
# that excludes ~/.local/bin (lace scripts), ~/.cargo/bin (nu), and linuxbrew (node).
# set-environment -g propagates to all run-shell invocations.
set-environment -g PATH "$HOME/.local/bin:$HOME/.cargo/bin:/home/linuxbrew/.linuxbrew/bin:/usr/lib64/ccache:/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin"

# =============================================================================
# Keybindings (Preserved from Legacy)
# =============================================================================

# Smart pane navigation (vim-aware)
# These manual is_vim bindings serve as a fallback if smart-splits.nvim
# is not installed. When smart-splits IS configured with the tmux backend,
# it overrides these bindings with its own bidirectional navigation.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Pane creation (Alt-hjkl): context-aware via lace-split.
# If the active pane is in a container: split into the same container.
# If the active pane is local: local split preserving current path.
# -t #{pane_id} ensures reliable pane targeting regardless of run-shell context.
# Fallback: if lace-split fails (not found, script error), do a plain tmux split.
unbind -n M-H
unbind -n M-J
unbind -n M-K
unbind -n M-L
bind -n M-l run-shell 'lace-split -h -t "#{pane_id}" || tmux split-window -h -t "#{pane_id}"'
bind -n M-h run-shell 'lace-split -h -U -t "#{pane_id}" || tmux split-window -h -t "#{pane_id}"'
bind -n M-j run-shell 'lace-split -v -t "#{pane_id}" || tmux split-window -v -t "#{pane_id}"'
bind -n M-k run-shell 'lace-split -v -U -t "#{pane_id}" || tmux split-window -v -t "#{pane_id}"'

# Image paste: context-aware via lace-paste-image.
# If clipboard has an image and pane is in a container: copies image via podman cp, pastes path.
# Otherwise: passes Ctrl+V through to the application.
# Fallback: if lace-paste-image fails, pass Ctrl+V through.
bind -n C-v run-shell 'lace-paste-image "#{pane_id}" || tmux send-keys -t "#{pane_id}" C-v'

# Window management (preserved)
bind -n M-N new-window -c '#{pane_current_path}'
bind -n M-n next-window
bind -n M-p previous-window

# Command line
bind -n M-\; command-prompt

# Copy mode (preserved Alt-c entry, enhanced bindings)
# Clipboard handled by tmux-yank plugin (auto-detects wl-copy/xclip/pbcopy).
# Manual copy-pipe bindings removed to avoid conflict with tmux-yank.
bind -n M-c copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# =============================================================================
# Pane Titles
# =============================================================================

# Display pane titles in borders
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# =============================================================================
# Conditional UI for VSCode/Nested Contexts
# =============================================================================

# Hide status bar and pane borders when nested in vscode
# Preserves legacy pattern: sessions starting with "vscode" get minimal UI
set-hook -g after-new-session {
  if-shell 'echo "#{session_name}" | grep -iqE "^vscode"' \
    "set status off; set pane-border-status off" \
    "set status on; set pane-border-status top"
}

# Also respect TMUX_NESTED env var for other nesting scenarios
if-shell '[ -n "$TMUX_NESTED" ]' \
  "set status off; set pane-border-status off"

# =============================================================================
# lace-split: Auto-SSH Splits
# =============================================================================

# lace-split (Alt+S): container-aware horizontal split.
# Now redundant with Alt+L but kept for muscle memory.
# Uses lace-split helper (same as Alt+HJKL bindings above).
bind -n M-S run-shell 'lace-split -h -t "#{pane_id}" || tmux split-window -h -t "#{pane_id}"'

# =============================================================================
# disconnect-pane: Drop SSH and Return to Local Shell
# =============================================================================

# disconnect-pane: Drop the current pane from SSH back to a local shell.
# Uses lace-disconnect-pane helper which clears pane-level lace options and
# respawns with the default shell. run-shell expands #{pane_id} before
# passing to /bin/sh (format vars do NOT expand in respawn-pane args directly).
# Usage: prefix + : then type "disconnect-pane", or press prefix + D
set -s command-alias[100] disconnect-pane='run-shell "lace-disconnect-pane #{pane_id}"'
bind D run-shell 'lace-disconnect-pane "#{pane_id}"'

# =============================================================================
# Plugin Stack
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'catppuccin/tmux'

# Resurrect + continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Catppuccin theme (mocha flavor)
# Replaces the hand-rolled solarized dark theme from the legacy config.
# Reasons for switching:
#   - Modular status bar: battery, CPU, session, git modules via config, not format strings
#   - Active maintenance: catppuccin/tmux is the most popular tmux theme (5k+ stars)
#   - Consistent palette across tools: catppuccin has ports for neovim, bat, fzf, etc.
#   - The legacy theme was ~30 lines of manual set-option color assignments
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Status bar modules (catppuccin)
set -g @catppuccin_date_time_text " %a, %h %d %H:%M"
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"
set -g status-right-length 100
set -g status-left-length 100

# Floax
set -g @floax-bind 'M-f'

# Status bar position (top, like legacy)
set -g status-position top

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# Post-plugin overrides (must come after TPM)

# Mouse: prevent clipboard overwrite on click/drag.
# Problem: tmux-yank binds MouseDragEnd1Pane to copy-pipe-and-cancel, so any
# drag (including micro-movement during a click-to-focus) copies to clipboard.
# Fix: unbind the auto-copy on drag-release; keep all other mouse behavior stock.
# Micro-drags may still briefly enter copy mode (tmux has no drag threshold),
# but this is harmless since nothing copies. Press Escape to dismiss.
#
# Workflow:
#   - Click/drag to select (enters copy mode, highlights text, no auto-copy)
#   - Double-click: select word, triple-click: select line (no auto-copy)
#   - Right-click in copy mode: yank to clipboard and exit
#   - 'y' in copy mode: yank to clipboard (via tmux-yank)
#   - Escape in copy mode: exit without copying

# Prevent drag-release from copying to clipboard (overrides tmux-yank)
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode    MouseDragEnd1Pane

# Re-bind drag-to-select (restore default; explicit because an earlier unbind persists
# in running servers even after the unbind line is removed from config)
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }

# Double-click selects word without copying (default auto-copies after 0.3s delay)
bind -T root         DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word }
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word

# Triple-click selects line without copying
bind -T root         TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-line }
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# Escape in copy mode: exit (default only clears selection)
bind -T copy-mode-vi Escape send-keys -X cancel

# Right-click in copy mode: yank selection to clipboard and exit
bind -T copy-mode-vi MouseDown3Pane send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode    MouseDown3Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Catppuccin overrides (catppuccin sets these with -gF, so must come after TPM)
# Copy-mode: yellow selection highlight and yellow pane border
set -g mode-style "fg=#11111b,bg=#f9e2af"
set -wg pane-active-border-style "#{?pane_in_mode,fg=#f9e2af,#{?pane_synchronized,fg=#cba6f7,fg=#b4befe}}"
